<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Countdown</title>

<style>

body{
font-family:Arial;
background:#202846;
margin:0;
padding:20px;
color:#FFFDC0;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

.mainCard{
background:#273140;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

.mainTitle{
font-size:26px;
margin-bottom:10px;
}

.mainCountdown{
font-size:42px;
color:#F3851F;
font-weight:bold;
}

.secondaryCard{
background:#5CB4C6;
padding:18px;
border-radius:10px;
margin:12px 0;
color:#202846;
}

.secondaryName{
font-size:18px;
font-weight:bold;
}

.secondaryCountdown{
font-size:22px;
margin-top:5px;
}

.sectionTitle{
margin:20px 0 10px;
font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<div id="mainEvent"></div>

<div id="secondaryEvents"></div>

</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS8L9PIlsNhYTVMiftZjxd2IXXAzjd2tEcdq4uNgWruD5aDv1vX6VOh_F5hAlYdwxvshlAVgxIf-zv9/pub?output=csv";

let mainEvent=null;
let secondaryEvents=[];

function parseDate(dateStr,timeStr){

let [day,month,year]=dateStr.split(".");
return new Date(`${year}-${month}-${day}T${timeStr}`);

}

function parseCSV(text){

let rows=text.trim().split("\n").slice(1);

let parsed=[];

rows.forEach(row=>{

let cols=row.split(",");

if(cols.length<4) return;

let type=cols[0].trim();
let name=cols[1].trim();
let date=cols[2].trim();
let time=cols[3].trim();

parsed.push({
type:type,
name:name,
date:parseDate(date,time)
});

});

return parsed;

}

function fetchSheet(){

fetch(csvURL)
.then(res=>res.text())
.then(data=>{

let events=parseCSV(data);

prepareEvents(events);

render();

})
.catch(err=>{

document.body.innerHTML="Could not load Google Sheet data.";
console.error(err);

});

}

function prepareEvents(events){

let now=new Date();

let future=events.filter(e=>e.date>now);

mainEvent=future.find(e=>e.type==="Main");

secondaryEvents=future
.filter(e=>e.type==="Secondary")
.sort((a,b)=>a.date-b.date)
.slice(0,3);

}

function getCountdown(target){

let now=new Date();
let diff=target-now;

if(diff<=0) return "Started";

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff/(1000*60*60))%24);
let minutes=Math.floor((diff/(1000*60))%60);
let seconds=Math.floor((diff/1000)%60);

return `${days}d ${hours}h ${minutes}m ${seconds}s`;

}

function render(){

if(mainEvent){

document.getElementById("mainEvent").innerHTML=`
<div class="mainCard">
<div class="mainTitle">${mainEvent.name}</div>
<div class="mainCountdown" id="mainCountdown"></div>
</div>
`;

}

let html=`<div class="sectionTitle">Upcoming Events</div>`;

secondaryEvents.forEach((e,i)=>{

html+=`
<div class="secondaryCard">
<div class="secondaryName">${e.name}</div>
<div class="secondaryCountdown" id="sec${i}"></div>
</div>
`;

});

document.getElementById("secondaryEvents").innerHTML=html;

updateCountdowns();
setInterval(updateCountdowns,1000);

}

function updateCountdowns(){

if(mainEvent){
document.getElementById("mainCountdown").innerText=getCountdown(mainEvent.date);
}

secondaryEvents.forEach((e,i)=>{

let el=document.getElementById(`sec${i}`);

if(el){
el.innerText=getCountdown(e.date);
}

});

}

fetchSheet();

</script>

</body>
</html>
