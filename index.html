<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Countdown</title>

<style>

body{
font-family:Arial;
background:#202846;
margin:0;
padding:20px;
color:#FFFDC0;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

.mainCard{
background:#273140;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

.mainTitle{
font-size:26px;
margin-bottom:10px;
}

.mainCountdown{
font-size:42px;
color:#F3851F;
font-weight:bold;
}

.secondaryCard{
background:#5CB4C6;
padding:18px;
border-radius:10px;
margin:12px 0;
color:#202846;
}

.secondaryName{
font-size:18px;
font-weight:bold;
}

.secondaryCountdown{
font-size:22px;
margin-top:5px;
}

.sectionTitle{
margin:20px 0 10px;
font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<div id="mainEvent"></div>

<div id="secondaryEvents"></div>

</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS8L9PIlsNhYTVMiftZjxd2IXXAzjd2tEcdq4uNgWruD5aDv1vX6VOh_F5hAlYdwxvshlAVgxIf-zv9/pub?output=csv";

let events=[];

function parseDate(dateStr,timeStr){

let [day,month,year]=dateStr.split(".");
return new Date(`${year}-${month}-${day}T${timeStr}`);

}

function parseCSV(text){

let lines=text.trim().split("\n");

for(let i=1;i<lines.length;i++){

let cols=lines[i].split(",");

let type=cols[0];
let name=cols[1];
let date=cols[2];
let time=cols[3];

events.push({
type:type.trim(),
name:name.trim(),
date:parseDate(date,time)
});

}

}

function fetchSheet(){

fetch(csvURL)
.then(res=>res.text())
.then(data=>{

parseCSV(data);
render();

})
.catch(err=>{

document.body.innerHTML="Could not load Google Sheet data.";
console.error(err);

});

}

function getCountdown(target){

let now=new Date();
let diff=target-now;

if(diff<=0) return null;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff/(1000*60*60))%24);
let minutes=Math.floor((diff/(1000*60))%60);
let seconds=Math.floor((diff/1000)%60);

return `${days}d ${hours}h ${minutes}m ${seconds}s`;

}

function render(){

let now=new Date();

let future=events.filter(e=>e.date>now);

let main=future.find(e=>e.type==="Main");

let secondary=future
.filter(e=>e.type==="Secondary")
.sort((a,b)=>a.date-b.date)
.slice(0,3);

if(main){

document.getElementById("mainEvent").innerHTML=`
<div class="mainCard">
<div class="mainTitle">${main.name}</div>
<div class="mainCountdown" id="mainCountdown"></div>
</div>
`;

}

let html=`<div class="sectionTitle">Upcoming Events</div>`;

secondary.forEach((e,i)=>{

html+=`
<div class="secondaryCard">
<div class="secondaryName">${e.name}</div>
<div class="secondaryCountdown" id="sec${i}"></div>
</div>
`;

});

document.getElementById("secondaryEvents").innerHTML=html;

setInterval(()=>updateCountdown(main,secondary),1000);

}

function updateCountdown(main,secondary){

if(main){

let cd=getCountdown(main.date);
document.getElementById("mainCountdown").innerText=cd || "Started";

}

secondary.forEach((e,i)=>{

let cd=getCountdown(e.date);

let el=document.getElementById(`sec${i}`);

if(el) el.innerText=cd || "Started";

});

}

fetchSheet();

</script>

</body>
</html>
